<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>F3D Web example</title>
    <style>
      /* Full-viewport app shell: header keeps its natural height, the content
         row fills the rest, and the 3D canvas fills all space left over after
         the sidebar. */
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .app-header {
        flex: 0 0 auto;
        padding: 1.25rem 1.5rem;
      }
      .app-content {
        flex: 1 1 auto;
        min-height: 0;
        padding: 0;
      }
      .app-content > .columns {
        height: 100%;
        margin: 0;
      }
      .app-content > .columns > .menu {
        flex: 0 0 auto;
        width: 220px;
        overflow-y: auto;
        padding: 1rem;
        margin: 0;
      }
      .app-content > .columns > .column {
        flex: 1 1 auto;
        min-width: 0;
        padding: 0;
        display: flex;
      }

      #main {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Glance3D control panel — DOM presenter (shares the libf3d `ui.control_panel` state).
         The web build is F3D_MODULE_UI=OFF (no ImGui), so these visuals are owned here. */
      .g3d-control-fab {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        background: rgba(28, 30, 38, 0.55);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        color: #eef1ff;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        transition:
          opacity 0.2s ease,
          transform 0.1s ease,
          background 0.15s ease;
        z-index: 10;
      }
      .g3d-control-fab:hover {
        background: rgba(40, 43, 54, 0.7);
        transform: translateY(-1px);
      }
      .g3d-control-fab.is-active {
        background: rgba(99, 110, 209, 0.85);
        border-color: rgba(160, 170, 240, 0.6);
        color: #ffffff;
      }
      .g3d-control-fab.is-idle {
        opacity: 0;
        pointer-events: none;
      }
      .g3d-control-fab svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .theme-light .g3d-control-fab {
        background: rgba(245, 246, 250, 0.7);
        border-color: rgba(0, 0, 0, 0.12);
        color: #2a2d34;
      }
      .theme-light .g3d-control-fab.is-active {
        background: rgba(99, 110, 209, 0.9);
        color: #ffffff;
      }

      .g3d-control-panel {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: 300px;
        max-width: 80%;
        box-sizing: border-box;
        padding: 16px;
        background: rgba(24, 26, 33, 0.92);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        color: #eef1ff;
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: -4px 0 16px rgba(0, 0, 0, 0.3);
        transform: translateX(100%);
        transition: transform 0.22s ease;
        z-index: 9;
        overflow-y: auto;
      }
      .g3d-control-panel.is-open {
        transform: translateX(0);
      }
      .theme-light .g3d-control-panel {
        background: rgba(250, 250, 252, 0.95);
        color: #2a2d34;
        border-left-color: rgba(0, 0, 0, 0.1);
      }
      .g3d-control-panel__title {
        font-weight: 600;
        font-size: 1rem;
        margin: 0 0 8px 0;
      }
      .g3d-control-panel__body {
        font-size: 0.875rem;
        opacity: 0.8;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <section class="section app-header">
        <div class="columns">
          <div class="column">
            <h1 class="title">F3D Web</h1>
            <p class="subtitle">A WebAssembly example using libf3d</p>
          </div>
          <div class="column">
            <div class="field is-pulled-right">
              <input
                id="dark"
                type="checkbox"
                name="dark"
                class="switch is-rounded"
                checked
              />
              <label for="dark">Dark theme</label>
            </div>
          </div>
        </div>
      </section>
      <section class="section app-content">
        <div class="columns">
          <aside class="menu">
            <div class="file has-name">
              <label class="file-label">
                <input
                  class="file-input"
                  type="file"
                  id="file-selector"
                  accept=".gml,.gltf,.glb,.obj,.ply,.pts,.stl,.vtk,.vtp,.vtu,.vtkhdf,.3ds,.wrl,.vrml,.fbx,.off,.x,.dae,.ex2,.exo,.e,.g,.stp,.step,.igs,.iges,.brep,.xbf,.drc,.mdl,.nc,.cdf,.ncdf"
                />
                <span class="file-cta">
                  <span class="file-label">Open a file...</span>
                </span>
                <span class="file-name" id="file-name"></span>
              </label>
            </div>
            <progress
              id="load-progress"
              class="progress is-info is-small mt-2"
              value="0"
              max="100"
              hidden
            ></progress>
            <div class="is-flex is-flex-direction-row is-align-items-center">
              <button id="y-up" class="button mx-1 is-small">+Y</button>
              <button id="z-up" class="button mx-1 is-small is-active">
                +Z
              </button>
              <label class="mx-1">Up</label>
            </div>
            <p class="menu-label">Widgets</p>
            <div class="field">
              <input
                id="grid"
                type="checkbox"
                name="grid"
                class="switch is-rounded"
                checked
              />
              <label for="grid">Grid</label>
            </div>
            <div class="field">
              <input
                id="axis"
                type="checkbox"
                name="axis"
                class="switch is-rounded"
                checked
              />
              <label for="axis">Axis</label>
            </div>
            <p class="menu-label">Rendering</p>
            <div class="field">
              <input
                id="fxaa"
                type="checkbox"
                name="fxaa"
                class="switch is-rounded"
                checked
              />
              <label for="fxaa">Anti-aliasing</label>
            </div>
            <div class="field">
              <input
                id="tone"
                type="checkbox"
                name="tone"
                class="switch is-rounded"
                checked
              />
              <label for="tone">Tone mapping</label>
            </div>
            <div class="field">
              <input
                id="ssao"
                type="checkbox"
                name="ssao"
                class="switch is-rounded"
                checked
              />
              <label for="ssao">Ambient occlusion</label>
            </div>
            <p class="menu-label">Lighting</p>
            <div class="field">
              <input
                id="ambient"
                type="checkbox"
                name="ambient"
                class="switch is-rounded"
                checked
              />
              <label for="ambient">Ambient light</label>
            </div>
          </aside>
          <div class="column">
            <div id="main">
              <canvas id="canvas"></canvas>
              <button
                id="g3d-control-fab"
                class="g3d-control-fab"
                type="button"
                aria-label="Control panel"
                aria-pressed="false"
                title="Control panel ( ` )"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <line x1="21" x2="14" y1="4" y2="4" />
                  <line x1="10" x2="3" y1="4" y2="4" />
                  <line x1="21" x2="12" y1="12" y2="12" />
                  <line x1="8" x2="3" y1="12" y2="12" />
                  <line x1="21" x2="16" y1="20" y2="20" />
                  <line x1="12" x2="3" y1="20" y2="20" />
                  <line x1="14" x2="14" y1="2" y2="6" />
                  <line x1="8" x2="8" y1="10" y2="14" />
                  <line x1="16" x2="16" y1="18" y2="22" />
                </svg>
              </button>
              <aside id="g3d-control-panel" class="g3d-control-panel">
                <p class="g3d-control-panel__title">Inspector (placeholder)</p>
                <p class="g3d-control-panel__body">
                  The professional control panel will live here.
                </p>
                <button
                  id="g3d-control-collapse"
                  class="button is-small"
                  type="button"
                >
                  Collapse
                </button>
              </aside>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
